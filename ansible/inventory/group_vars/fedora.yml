---
fedora_dnf_packages:
  - stow
  - python3-pip
  - vim
  - curl
  - jq
  - zsh
  - tmux
  - iproute
  - nodejs
  - git
  - fd-find
  - ripgrep
  - dnf-plugins-core
  - bat
  - btop
  - fzf
  - gh
  - git-delta
  - helm
  - jid
  - k9s
  - kind
  - starship
  - terraform
  - tig
  - neovim
  - zoxide
  - ghostty

# Packages not available in DNF on Fedora
brew_packages:
  - eza
  - kubectx
  - terragrunt
  - kubecolor
  - zellij

homebrew_prefix: /home/linuxbrew/.linuxbrew
zellij_plugin_dir: "{{ ansible_facts.env.HOME }}/.local/share/zellij/plugins"
