---
- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config"
    state: directory
    mode: '0755'

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.ssh"
    state: directory
    mode: '0700'

- name: Back up conflicting dotfiles before stowing
  ansible.builtin.shell: |
    stow --simulate -v {{ item }} 2>&1 | grep -oP "(?<=over existing target )\S+" | while read -r file; do
      target="{{ ansible_facts.env.HOME }}/$file"
      if [ -e "$target" ] && [ ! -L "$target" ]; then
        mv "$target" "${target}_original"
      fi
    done
  args:
    chdir: "{{ dotfiles_dir }}"
  loop: "{{ stow_packages }}"
  changed_when: false

- name: Stow dotfile packages
  ansible.builtin.command:
    cmd: stow -v {{ item }}
    chdir: "{{ dotfiles_dir }}"
  loop: "{{ stow_packages }}"
  register: stow_result
  changed_when: "'LINK:' in stow_result.stderr"
  failed_when: stow_result.rc != 0 and 'already points' not in stow_result.stderr

- name: Clone kickstart.nvim config
  ansible.builtin.git:
    repo: https://github.com/djpinger/kickstart.nvim.git
    dest: "{{ ansible_facts.env.XDG_CONFIG_HOME | default(ansible_facts.env.HOME + '/.config') }}/nvim"
    update: false

- name: Ensure .npm-global directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.npm-global"
    state: directory
    mode: '0755'

- name: Configure npm global prefix
  ansible.builtin.command:
    cmd: npm config set prefix '{{ ansible_facts.env.HOME }}/.npm-global'
  changed_when: false
  environment:
    PATH: "{{ homebrew_prefix | default('') }}/bin:{{ ansible_facts.env.PATH }}"

