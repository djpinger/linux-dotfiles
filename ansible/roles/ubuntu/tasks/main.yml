---
- name: Install apt packages
  ansible.builtin.apt:
    name: "{{ ubuntu_apt_packages }}"
    state: present
  become: true

- name: Install Docker via official install script
  ansible.builtin.shell: |
    curl -fsSL https://get.docker.com | sh
  args:
    creates: /usr/bin/docker
  become: true

- name: Add Sublime Text GPG key
  ansible.builtin.shell: |
    curl -fsSL https://download.sublimetext.com/sublimehq-pub.gpg | gpg --dearmor -o /etc/apt/trusted.gpg.d/sublimehq-archive.gpg
  args:
    creates: /etc/apt/trusted.gpg.d/sublimehq-archive.gpg
  become: true

- name: Add Sublime Text repository
  ansible.builtin.apt_repository:
    repo: "deb https://download.sublimetext.com/ apt/stable/"
    state: present
    filename: sublime-text
  become: true
  notify: Update apt cache

- name: Flush handlers to update apt cache
  ansible.builtin.meta: flush_handlers

- name: Install Sublime Text
  ansible.builtin.apt:
    name: sublime-text
    state: present
  become: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    groups: docker
    append: true
  become: true

- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: /home/linuxbrew/.linuxbrew/bin/brew
  register: homebrew_check

- name: Create linuxbrew directory
  ansible.builtin.file:
    path: /home/linuxbrew/.linuxbrew
    state: directory
    owner: "{{ ansible_facts.user_id }}"
    group: "{{ ansible_facts.user_id }}"
    mode: '0755'
  become: true
  when: not homebrew_check.stat.exists

- name: Install Homebrew
  ansible.builtin.shell: |
    NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: not homebrew_check.stat.exists

- name: Install brew packages
  community.general.homebrew:
    name: "{{ brew_packages }}"
    state: present
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts.env.PATH }}"

- name: Ensure fonts directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.local/share/fonts"
    state: directory
    mode: '0755'

- name: Download nerd fonts
  ansible.builtin.get_url:
    url: "https://www.naurwhal.com/fonts/{{ item }}"
    dest: "{{ ansible_facts.env.HOME }}/.local/share/fonts/{{ item }}"
    mode: '0644'
  loop: "{{ nerd_fonts }}"
  notify: Refresh font cache

- name: Ensure gtk-3.0 config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/gtk-3.0"
    state: directory
    mode: '0755'

- name: Configure GTK3 window buttons
  ansible.builtin.copy:
    dest: "{{ ansible_facts.env.HOME }}/.config/gtk-3.0/settings.ini"
    content: |
      [Settings]
      gtk-decoration-layout=menu:minimize,maximize,close
    mode: '0644'

- name: Ensure gtk-4.0 config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/gtk-4.0"
    state: directory
    mode: '0755'

- name: Configure GTK4 window buttons
  ansible.builtin.copy:
    dest: "{{ ansible_facts.env.HOME }}/.config/gtk-4.0/settings.ini"
    content: |
      [Settings]
      gtk-decoration-layout=menu:minimize,maximize,close
    mode: '0644'

- name: Check if running in WSL
  ansible.builtin.shell: grep -qi microsoft /proc/version && echo "wsl" || echo "linux"
  register: wsl_check
  changed_when: false

- name: Get Windows username
  ansible.builtin.command: powershell.exe -Command "$env:USERNAME"
  register: windows_username
  changed_when: false
  when: wsl_check.stdout == "wsl"

- name: Create WezTerm config directory on Windows
  ansible.builtin.shell:
    cmd: mkdir -p "/mnt/c/Users/{{ windows_username.stdout | trim }}/.config/wezterm"
  changed_when: false
  when: wsl_check.stdout == "wsl"

- name: Copy WezTerm config to Windows filesystem
  ansible.builtin.shell:
    cmd: cp "{{ dotfiles_dir }}/wezterm/.config/wezterm/wezterm.lua" "/mnt/c/Users/{{ windows_username.stdout | trim }}/.config/wezterm/wezterm.lua"
  changed_when: true
  when: wsl_check.stdout == "wsl"

- name: Check if WezTerm local config exists on Windows
  ansible.builtin.stat:
    path: "/mnt/c/Users/{{ windows_username.stdout | trim }}/.config/wezterm/local.lua"
  register: wezterm_local_config
  when: wsl_check.stdout == "wsl"

- name: Prompt for WezTerm font size
  ansible.builtin.pause:
    prompt: "Enter font size for WezTerm (recommended: 11 for 1080p, 15 for 1440p)"
  register: wezterm_font_size_input
  when: wsl_check.stdout == "wsl" and not wezterm_local_config.stat.exists

- name: Set WezTerm font size variable
  ansible.builtin.set_fact:
    wezterm_font_size: "{{ wezterm_font_size_input.user_input | default('11') }}"
  when: wsl_check.stdout == "wsl" and not wezterm_local_config.stat.exists

- name: Write WezTerm local config to Windows filesystem
  ansible.builtin.shell: |
    cat > "/mnt/c/Users/{{ windows_username.stdout | trim }}/.config/wezterm/local.lua" << 'EOF'
    -- Machine-specific WezTerm configuration
    -- This file is not tracked in git

    return {
      font_size = {{ wezterm_font_size }},
    }
    EOF
  when: wsl_check.stdout == "wsl" and not wezterm_local_config.stat.exists

- name: Add Griffo GPG key
  ansible.builtin.shell: |
    curl -sS https://debian.griffo.io/EA0F721D231FDD3A0A17B9AC7808B4DD62C41256.asc | gpg --dearmor --yes -o /etc/apt/trusted.gpg.d/debian.griffo.io.gpg
  args:
    creates: /etc/apt/trusted.gpg.d/debian.griffo.io.gpg
  become: true

- name: Get Griffo repo codename
  ansible.builtin.shell: |
    if grep -q '^ID=pika' /etc/os-release; then
      grep -oP '(?<=DEBIAN_CODENAME=)\S+' /etc/os-release
    else
      lsb_release -sc
    fi
  register: griffo_codename
  changed_when: false

- name: Add Griffo repository
  ansible.builtin.apt_repository:
    repo: "deb https://debian.griffo.io/apt {{ griffo_codename.stdout }} main"
    state: present
    filename: debian.griffo.io
  become: true
  notify: Update apt cache

- name: Flush handlers to update apt cache for Griffo
  ansible.builtin.meta: flush_handlers

- name: Install Ghostty
  ansible.builtin.apt:
    name: ghostty
    state: present
  become: true
